<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Site Blocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
    }

    .card {
      background: #ebebeb;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.1);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    .domain {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      background: #e0e0e0;
      padding: 4px 14px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .message {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .usage-chip {
      font-size: 12px;
      color: #555;
      background: #e0e0e0;
      padding: 6px 16px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 28px;
    }

    .usage-chip strong { color: #1a1a1a; }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: 1.5px solid #ccc;
      background: transparent;
      color: #555;
      transition: all 0.15s;
    }

    .btn:hover {
      background: rgba(0,0,0,0.06);
      color: #111;
      border-color: #999;
    }

    .btn-unblock {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .btn-unblock:hover {
      background: #333;
      border-color: #333;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🚫</span>
    <h1>Site Blocked</h1>
    <div class="domain" id="siteDomain">—</div>
    <div class="usage-chip">Today: <strong id="todayUsage">loading...</strong></div>
    <p class="message">
      You've blocked this site to stay focused.<br>
      Come back later, or unblock it if you really need to.
    </p>
    <div class="buttons">
      <button class="btn" id="backBtn">← Go Back</button>
      <button class="btn btn-unblock" id="unblockBtn">Unblock Site</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const site   = params.get('site') || 'unknown';

    document.getElementById('siteDomain').textContent = site;

    // Show today's usage
    const today = new Date().toISOString().split('T')[0];
    chrome.storage.local.get([today], (data) => {
      const dayData = data[today] || {};
      const ms = dayData[site] || 0;
      const m  = Math.floor(ms / 60000);
      const h  = Math.floor(m / 60);
      const label = h > 0 ? `${h}h ${m % 60}m` : m > 0 ? `${m}m` : 'none today';
      document.getElementById('todayUsage').textContent = label;
    });

    document.getElementById('backBtn').addEventListener('click', () => history.back());

    document.getElementById('unblockBtn').addEventListener('click', () => {
      chrome.storage.local.get(['blockedSites'], (result) => {
        const list = (result.blockedSites || []).filter(d => d !== site);
        chrome.storage.local.set({ blockedSites: list }, () => {
          history.back();
        });
      });
    });
  </script>
</body>
</html>
